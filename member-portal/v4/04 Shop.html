<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>x10s Member — Shop</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/css/tokens.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--font-primary);background:#211C16;background-image:radial-gradient(circle at 30% 0%,#33291f,#211C16 60%);min-height:100vh;-webkit-font-smoothing:antialiased;}
svg{display:block;}

/* ── Stage ── */
.stage{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:28px 20px 64px;}
.stage-bar{display:flex;align-items:center;gap:16px;width:100%;max-width:1180px;margin-bottom:28px;color:#E8DDD0;}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:15px;}
.logo{width:30px;height:30px;border-radius:9px;background:var(--color-primary);display:grid;place-items:center;box-shadow:var(--shadow-2);}
.crumb{font-size:12px;color:#A89880;font-weight:500;}
.spacer{flex:1;}
.seg{display:inline-flex;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:var(--radius-full);padding:3px;}
.seg button{font-family:inherit;font-size:12.5px;font-weight:600;color:#C9BBA8;background:transparent;border:none;cursor:pointer;padding:7px 16px;border-radius:var(--radius-full);transition:all var(--duration-fast) ease;display:flex;align-items:center;gap:7px;}
.seg button.on{background:var(--color-surface);color:var(--color-text-primary);box-shadow:var(--shadow-1);}

/* ── Frame ── */
.frame{position:relative;background:#0f0d0b;border-radius:52px;padding:14px;box-shadow:0 40px 80px -20px rgba(0,0,0,.6),0 0 0 2px rgba(255,255,255,.04);width:392px;height:836px;}
.frame.desktop{width:1180px;height:792px;border-radius:22px;padding:0;}
.frame.desktop .notch{display:none;}
.notch{position:absolute;top:14px;left:50%;transform:translateX(-50%);width:128px;height:30px;background:#0f0d0b;border-radius:0 0 18px 18px;z-index:60;}
.screen{position:relative;width:100%;height:100%;overflow:hidden;border-radius:40px;background:var(--color-surface-lowest);container-type:inline-size;}
.frame.desktop .screen{border-radius:22px;}

/* ── App grid ── */
.app{width:100%;height:100%;display:grid;grid-template-rows:auto 1fr auto;grid-template-areas:"header" "main" "nav";}
.app-header{grid-area:header;}
.app-main{grid-area:main;overflow-y:auto;overflow-x:hidden;}
.app-nav{grid-area:nav;}

/* ── Status bar ── */
.statusbar{display:flex;align-items:center;justify-content:space-between;padding:11px 28px 4px;font-size:13px;font-weight:700;color:var(--color-text-primary);background:var(--color-surface);}
.statusbar .sb-right{display:flex;align-items:center;gap:6px;}
.frame.desktop .statusbar{display:none;}

/* ── Header ── */
.hdr{display:flex;align-items:center;gap:var(--space-sm);padding:10px var(--space-md) 12px;background:var(--color-surface);border-bottom:var(--border-subtle) solid var(--color-border-subtle);}
.profile-switch{display:flex;align-items:center;gap:10px;flex:1;min-width:0;background:transparent;border:none;cursor:pointer;font-family:inherit;padding:4px 6px;border-radius:var(--radius-sm);transition:background var(--duration-fast) ease;}
.profile-switch:hover{background:var(--color-surface-variant);}
.avatar{width:38px;height:38px;border-radius:var(--radius-full);display:grid;place-items:center;color:#fff;font-weight:700;font-size:15px;background:linear-gradient(135deg,#8B5E15,#6D4810);border:1.5px solid rgba(255,255,255,.5);box-shadow:var(--shadow-1);flex-shrink:0;}
.avatar.sm{width:30px;height:30px;font-size:12px;}
.avatar.olive{background:linear-gradient(135deg,#6c7026,#454914);}
.avatar.slate{background:linear-gradient(135deg,#3d5168,#2E4055);}
.ps-text{text-align:left;min-width:0;}
.ps-label{font-size:10px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;color:var(--color-text-disabled);}
.ps-name{font-size:15px;font-weight:700;color:var(--color-text-primary);display:flex;align-items:center;gap:4px;}
.icon-btn{width:40px;height:40px;border-radius:var(--radius-full);border:none;background:transparent;cursor:pointer;display:grid;place-items:center;color:var(--color-text-secondary);transition:background var(--duration-fast) ease;}
.icon-btn:hover{background:var(--color-surface-variant);}

/* ── Nav ── */
.nav{display:flex;align-items:stretch;background:var(--color-surface);border-top:var(--border-subtle) solid var(--color-border-subtle);padding:6px 4px 0;padding-bottom:max(6px,env(safe-area-inset-bottom));}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;cursor:pointer;font-family:inherit;padding:7px 2px 12px;color:var(--color-text-disabled);transition:color var(--duration-fast) ease;}
.nav-item .ni-label{font-size:10.5px;font-weight:700;}
.nav-item.on{color:var(--color-primary);}
.rail-brand{display:none;}
.rail-foot{display:none;}

/* ── Shared ── */
.card{background:var(--color-surface);border-radius:var(--radius-md);border:var(--border-hairline) solid var(--color-border-subtle);box-shadow:var(--shadow-1);overflow:hidden;}
.sec-head{display:flex;align-items:center;justify-content:space-between;padding:0 2px;}
.sec-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.1px;color:var(--color-text-secondary);}
.btn{font-family:inherit;font-size:14px;font-weight:700;border-radius:var(--radius-sm);border:none;cursor:pointer;padding:13px 18px;display:flex;align-items:center;justify-content:center;gap:8px;width:100%;transition:background var(--duration-fast) ease,transform var(--duration-fast) ease;}
.btn:active{transform:scale(.99);}
.btn-primary{background:var(--color-primary);color:var(--color-on-primary);box-shadow:var(--shadow-1);}
.btn-primary:hover{background:var(--color-primary-hover);}
.btn-primary:disabled{background:var(--color-border-emphasis);color:var(--color-text-disabled);cursor:not-allowed;box-shadow:none;transform:none;}
.btn-ghost{background:transparent;color:var(--color-primary);border:1.5px solid var(--color-primary);}

/* ── View toggle (Catalog / Purchases) ── */
.view-seg{display:flex;background:var(--color-surface-variant);border-radius:var(--radius-sm);padding:3px;margin:var(--space-md) var(--space-md) 0;gap:2px;}
.vt{flex:1;font-family:inherit;font-size:13px;font-weight:700;border:none;cursor:pointer;padding:9px 4px;border-radius:var(--radius-xs);background:transparent;color:var(--color-text-secondary);transition:all var(--duration-fast) ease;}
.vt.on{background:var(--color-surface);color:var(--color-text-primary);box-shadow:var(--shadow-1);}

/* ── Catalog feed ── */
.shop-feed{padding:var(--space-md);display:flex;flex-direction:column;gap:var(--space-md);}
.gc-left,.gc-right,.gc-bottom{display:flex;flex-direction:column;gap:var(--space-md);}

/* ── Product rows ── */
.prod-list{display:flex;flex-direction:column;background:var(--color-surface);border-radius:var(--radius-md);border:var(--border-hairline) solid var(--color-border-subtle);box-shadow:var(--shadow-1);overflow:hidden;}
.prod-row{display:flex;align-items:center;gap:12px;padding:12px var(--space-md);cursor:pointer;transition:background var(--duration-fast) ease;}
.prod-row:hover{background:var(--color-surface-lowest);}
.prod-row+.prod-row{border-top:var(--border-hairline) solid var(--color-border-subtle);}
.prod-ico{width:36px;height:36px;border-radius:var(--radius-sm);flex-shrink:0;display:grid;place-items:center;}
.ic-credit{background:var(--color-warning-container);color:var(--color-primary);}
.ic-pass{background:var(--color-success-container);color:var(--color-success);}
.ic-locker{background:var(--color-surface-variant);color:var(--color-text-secondary);}
.ic-combo{background:var(--color-warning-container);color:var(--color-warning);}
.ic-act{background:var(--color-error-container);color:var(--color-error);}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:14px;font-weight:700;line-height:1.2;}
.prod-sub{font-size:12px;color:var(--color-text-secondary);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.prod-save{display:inline-block;font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:2px 7px;border-radius:var(--radius-full);background:var(--color-success-container);color:var(--color-success);margin-top:5px;}
.prod-save.sv-warn{background:var(--color-warning-container);color:var(--color-warning);}
.prod-save.sv-lim{background:var(--color-error-container);color:var(--color-error);}
.prod-action{flex-shrink:0;display:flex;align-items:center;gap:10px;}
.prod-price{font-size:16px;font-weight:800;color:var(--color-text-primary);letter-spacing:-.3px;white-space:nowrap;}
.buy-btn{font-family:inherit;font-size:12px;font-weight:700;border:none;cursor:pointer;padding:6px 14px;border-radius:var(--radius-sm);background:var(--color-primary);color:#fff;white-space:nowrap;transition:background var(--duration-fast) ease;}
.buy-btn:hover{background:var(--color-primary-hover);}

/* ── Purchase history ── */
.hist-view{padding:var(--space-md);display:flex;flex-direction:column;gap:var(--space-md);}
.hist-filter{display:flex;background:var(--color-surface-variant);border-radius:var(--radius-sm);padding:3px;gap:2px;}
.ht{flex:1;font-family:inherit;font-size:12px;font-weight:700;border:none;cursor:pointer;padding:7px 2px;border-radius:var(--radius-xs);background:transparent;color:var(--color-text-secondary);transition:all var(--duration-fast) ease;white-space:nowrap;}
.ht.on{background:var(--color-surface);color:var(--color-text-primary);box-shadow:var(--shadow-1);}
.hist-group-head{padding:9px var(--space-md) 4px;font-size:10.5px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--color-text-disabled);background:var(--color-surface-lowest);}
.hist-row{display:flex;align-items:center;gap:12px;padding:12px var(--space-md);cursor:pointer;transition:background var(--duration-fast) ease;}
.hist-row:hover{background:var(--color-surface-lowest);}
.hist-row+.hist-row{border-top:var(--border-hairline) solid var(--color-border-subtle);}
.hi-ico{width:34px;height:34px;border-radius:var(--radius-full);flex-shrink:0;display:grid;place-items:center;}
.hi-body{flex:1;min-width:0;}
.hi-name{font-size:14px;font-weight:700;}
.hi-sub{font-size:11.5px;color:var(--color-text-secondary);margin-top:1px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hi-right{text-align:right;flex-shrink:0;}
.hi-price{font-size:14px;font-weight:700;white-space:nowrap;}
.st-chip{font-size:10px;font-weight:700;letter-spacing:.3px;text-transform:uppercase;padding:2px 7px;border-radius:var(--radius-full);margin-top:4px;display:inline-block;white-space:nowrap;}
.st-active{background:rgba(42,107,62,.12);color:var(--color-success);}
.st-pending{background:rgba(155,79,0,.1);color:var(--color-warning);}
.st-expired,.st-used{background:var(--color-surface-variant);color:var(--color-text-disabled);}
.st-upcoming{background:rgba(42,107,62,.12);color:var(--color-success);}
.hist-empty{padding:32px var(--space-md);text-align:center;color:var(--color-text-disabled);font-size:13px;font-weight:600;}

/* ── Month filter bar (purchases) ── */
.month-bar{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;-webkit-overflow-scrolling:touch;}
.month-bar::-webkit-scrollbar{display:none;}
.month-pill{font-family:inherit;font-size:13px;font-weight:700;padding:7px 16px;border-radius:var(--radius-full);border:none;cursor:pointer;white-space:nowrap;background:var(--color-surface-variant);color:var(--color-text-secondary);transition:all var(--duration-fast) ease;flex-shrink:0;}
.month-pill.on{background:var(--color-primary);color:#fff;}
.month-pill.empty{opacity:.45;}

/* ── Purchase detail sheet ── */
.det-sheet{max-height:80%;overflow-y:auto;padding-bottom:calc(28px + env(safe-area-inset-bottom));}
.det-header{display:flex;align-items:center;gap:12px;padding:10px 0 14px;border-bottom:var(--border-hairline) solid var(--color-border-subtle);margin-bottom:4px;}
.det-ico{width:44px;height:44px;border-radius:var(--radius-sm);flex-shrink:0;display:grid;place-items:center;}
.det-title-block{flex:1;min-width:0;}
.det-name{font-size:16px;font-weight:700;line-height:1.2;}
.det-date{font-size:12px;color:var(--color-text-secondary);margin-top:2px;}
.det-price-block{text-align:right;flex-shrink:0;}
.det-price{font-size:18px;font-weight:800;letter-spacing:-.4px;}
.det-body{display:flex;flex-direction:column;}
.det-section{margin-bottom:2px;}
.det-section+.det-section{border-top:var(--border-subtle) solid var(--color-border-subtle);margin-top:10px;padding-top:10px;}
.det-section-head{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--color-text-disabled);margin-bottom:6px;}
.det-row{display:flex;justify-content:space-between;align-items:flex-start;padding:10px 0;border-bottom:var(--border-hairline) solid var(--color-border-subtle);}
.det-row.det-row-last{border-bottom:none;}
.det-lbl{font-size:13px;font-weight:600;color:var(--color-text-secondary);}
.det-val{font-size:13px;font-weight:700;text-align:right;max-width:60%;}
.det-ref{font-family:monospace;font-size:12px;color:var(--color-text-disabled);}

/* ── Sheets ── */
.scrim{position:absolute;inset:0;background:rgba(28,22,17,.45);z-index:80;opacity:0;pointer-events:none;transition:opacity var(--duration-normal) ease;}
.scrim.open{opacity:1;pointer-events:auto;}
.sheet{position:absolute;left:0;right:0;bottom:0;z-index:81;background:var(--color-surface);border-radius:var(--radius-xl) var(--radius-xl) 0 0;box-shadow:var(--shadow-5);padding:8px var(--space-md) calc(20px + env(safe-area-inset-bottom));transform:translateY(100%);transition:transform var(--duration-slow) cubic-bezier(.4,0,.2,1);}
.sheet.open{transform:translateY(0);}
.sheet-grip{width:38px;height:4px;border-radius:99px;background:var(--color-border-emphasis);margin:8px auto 6px;}
.sheet-title{font-size:17px;font-weight:700;padding:5px 0 3px;}

/* Profile sheet */
.prof-item{display:flex;align-items:center;gap:13px;width:100%;text-align:left;cursor:pointer;font-family:inherit;padding:12px;border-radius:var(--radius-md);background:transparent;border:1.5px solid transparent;transition:background var(--duration-fast) ease;}
.prof-item:hover{background:var(--color-surface-lowest);}
.prof-item.active{background:var(--color-surface-highest);border-color:var(--color-primary);}
.pi-text{flex:1;}.pi-name{font-size:15px;font-weight:700;}.pi-meta{font-size:12px;color:var(--color-text-secondary);}
.pi-chk{margin-left:auto;color:var(--color-primary);}
.sheet-sub{font-size:12.5px;color:var(--color-text-secondary);padding:0 2px 12px;}


/* ── Desktop ── */
@container (min-width:760px){
  .app{grid-template-columns:248px 1fr;grid-template-rows:69px 1fr;grid-template-areas:"nav header" "nav main";}
  .app-main{background:var(--color-surface-lowest);}
  .hdr{padding:14px 40px;}
  .nav{flex-direction:column;align-items:stretch;justify-content:flex-start;border-top:none;border-right:var(--border-subtle) solid var(--color-border-subtle);background:var(--color-surface-variant);padding:0;gap:4px;}
  .rail-brand{display:flex;align-items:center;gap:11px;padding:22px;border-bottom:var(--border-hairline) solid var(--color-border-subtle);margin-bottom:8px;}
  .rail-brand .logo{width:36px;height:36px;border-radius:11px;background:var(--color-primary);display:grid;place-items:center;}
  .rail-brand .rb-name{font-size:16px;font-weight:800;}
  .rail-brand .rb-sub{font-size:10.5px;color:var(--color-text-secondary);font-weight:600;}
  .nav-item{flex:0 0 auto;flex-direction:row;justify-content:flex-start;gap:14px;padding:13px 22px;margin:0 12px;border-radius:var(--radius-sm);}
  .nav-item .ni-label{font-size:14px;}
  .nav-item.on{background:var(--color-surface-highest);color:var(--color-primary);}
  .rail-foot{display:flex;align-items:center;gap:10px;margin-top:auto;padding:16px 20px;border-top:var(--border-hairline) solid var(--color-border-subtle);}
  .rf-name{font-size:13px;font-weight:700;}.rf-sub{font-size:11px;color:var(--color-text-secondary);}
  .view-seg{margin:32px 40px 0;max-width:320px;}
  .shop-feed{max-width:1040px;margin:0 auto;padding:20px 40px 48px;display:grid;grid-template-columns:1fr 1fr;gap:20px 28px;align-items:start;}
  .gc-left,.gc-right{gap:20px;}
  .gc-bottom{grid-column:1 / -1;}
  .hist-view{max-width:1040px;margin:0 auto;padding:20px 40px 48px;}
}
</style>

                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="m7 10 5 5 5-5" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>

<div class="shop-feed" id="shopFeed"></div>

        </div><!-- /main -->

        <!-- NAV -->
        <nav class="nav">
          <div class="rail-brand">
            <span class="logo"><svg width="20" height="20" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="#fff" stroke-width="2"/><circle cx="12" cy="12" r="4.5" stroke="#fff" stroke-width="2"/><circle cx="12" cy="12" r="1.4" fill="#fff"/></svg></span>
            <span><div class="rb-name">x10s</div><div class="rb-sub">Salt Light Archery</div></span>

            <span class="ni-label">Home</span>

      </div>`).join('');
  } else if(h.type==='act'){
    const codes = (h.detail.bookingCodes && h.detail.bookingCodes.length) ? h.detail.bookingCodes.join(', ') : '—';
    let topRows = '';
    if(h.subtype === 'postpaid'){
      topRows = `<div class="det-row"><span class="det-lbl">Billed duration</span><span class="det-val">${h.detail.billedDuration}</span></div>`;
    }
    topRows += `<div class="det-row"><span class="det-lbl">Booking code(s)</span><span class="det-val">${codes}</span></div>`;
    const voucherRow = h.detail.voucherCode ? `<div class="det-row"><span class="det-lbl">Voucher code</span><span class="det-val">${h.detail.voucherCode}</span></div>` : '';
    rows = topRows + `
      <div class="det-section">
        <div class="det-section-head">Purchase summary</div>
        <div class="det-row"><span class="det-lbl">Amount paid</span><span class="det-val">$${h.price}.00</span></div>
        ${voucherRow}
        <div class="det-row"><span class="det-lbl">Payment method</span><span class="det-val">${h.method}</span></div>
        <div class="det-row det-row-last"><span class="det-lbl">Sale reference</span><span class="det-val det-ref">${h.ref}</span></div>
      </div>`;
  }
  if(h.type !== 'act'){
    rows += `<div class="det-row"><span class="det-lbl">Payment</span><span class="det-val">${h.method}</span></div>
      <div class="det-row det-row-last"><span class="det-lbl">Sale reference</span><span class="det-val det-ref">${h.ref}</span></div>`;
  }

  const ico = HI_ICO[h.type]||HI_ICO.credit;
  const icoCls = HI_ICO_CLS[h.type]||'ic-credit';
  return `<div class="sheet-grip"></div>
    <div class="det-header">
      <span class="det-ico ${icoCls}">${ico}</span>
      <div class="det-title-block">
        <div class="det-name">${h.name}</div>
        <div class="det-date">${h.date}</div>
      </div>
      <div class="det-price-block">
        <div class="det-price">$${h.price}.00</div>
      </div>
    </div>
    <div class="det-body">${rows}</div>`;
}

/* ── Init ── */
renderCatalog();
renderHistMonthBar();
renderHistory();
</script>
